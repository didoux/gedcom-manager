spring:
  application:
    name: gedcom-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/gedcom_db
    username: gedcom_user
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: ${NEO4J_PASSWORD:changeme}

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

logging:
  level:
    com.genealogy.gedcom: DEBUG
    org.springframework.data: DEBUG